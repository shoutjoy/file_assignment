name: Build Windows EXE

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: PyInstaller (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install --upgrade pip -r requirements-build.txt

      - name: Build EXE
        run: python -m PyInstaller --noconfirm FileAssignmentManager.spec

      - name: Upload dist folder (Actions에서 다운로드)
        uses: actions/upload-artifact@v4
        with:
          name: FileAssignmentManager-dist
          path: dist

  release:
    name: Attach dist & EXE to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: FileAssignmentManager-dist
          path: release-dist

      - name: Zip dist for one-file download
        run: |
          cd release-dist
          zip -r "$GITHUB_WORKSPACE/FileAssignmentManager-dist.zip" .

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-dist/FileAssignmentManager.exe
            FileAssignmentManager-dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
